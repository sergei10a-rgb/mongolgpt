name: "MongolGPT GitHub Action"
description: "GitHub workflow дотор MongolGPT ажиллуулна"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Ашиглах provider/model"
    required: true

  agent:
    description: "Ашиглах үндсэн агент; хоосон бол тохиргооны анхдагч агентыг хэрэглэнэ"
    required: false

  share:
    description: "MongolGPT сешнийг нийтлэх эсэх; өөрийн share backend тохируулсан үед хэрэглэнэ"
    required: false
    default: "false"

  share_base_url:
    description: "Өөрийн share backend-ийн үндсэн URL"
    required: false

  prompt:
    description: "Анхдагч даалгаврыг орлуулах заавар"
    required: false

  use_github_token:
    description: "Өөрийн GitHub App-ийн оронд workflow-ийн GITHUB_TOKEN-ийг шууд ашиглана"
    required: false
    default: "true"

  mentions:
    description: "Таслалаар тусгаарласан дуудах үгс; анхдагч нь /mongolgpt,/oc"
    required: false

  variant:
    description: "Загварын reasoning хувилбар, жишээ нь high эсвэл max"
    required: false

  oidc_base_url:
    description: "Өөрийн GitHub App ашиглах үед OIDC token солилцох API-ийн үндсэн URL"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get mongolgpt version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/sergei10a-rgb/mongolgpt/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache mongolgpt
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.mongolgpt/bin
        key: mongolgpt-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install mongolgpt
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://raw.githubusercontent.com/sergei10a-rgb/mongolgpt/main/install | bash

    - name: Add mongolgpt to PATH
      shell: bash
      run: echo "$HOME/.mongolgpt/bin" >> $GITHUB_PATH

    - name: Run mongolgpt
      shell: bash
      id: run_mongolgpt
      run: mongolgpt github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        GITHUB_TOKEN: ${{ github.token }}
        MONGOLGPT_SHARE_URL: ${{ inputs.share_base_url }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
