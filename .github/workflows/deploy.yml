name: Cloudflare deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deploy хийх орчин"
        required: true
        type: choice
        default: dev
        options:
          - dev
          - production
      hosted_services:
        description: "Account, auth болон Free Auto API-г асаах"
        required: true
        type: boolean
        default: false
      analytics:
        description: "Hosted deploy дээр Cloudflare D1 live stats-г асаах"
        required: true
        type: boolean
        default: false
      production_confirmation:
        description: "Production бол DEPLOY <domain> гэж яг бичнэ"
        required: false
        type: string

concurrency:
  group: cloudflare-deploy-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MONGOLGPT_DOMAIN: ${{ vars.MONGOLGPT_DOMAIN }}
  MONGOLGPT_ENABLE_HOSTED_SERVICES: ${{ inputs.hosted_services }}
  MONGOLGPT_ENABLE_ANALYTICS: ${{ inputs.analytics }}
  MONGOLGPT_ENABLE_BUSINESS_INTEGRATIONS: "false"
  MONGOLGPT_ENABLE_LEGACY_STRIPE: "false"
  MONGOLGPT_ENABLE_MONITORING: "false"
  MONGOLGPT_ENABLE_SHARE_SERVICE: "false"
  MONGOLGPT_ENABLE_SYNC_SERVICE: "false"
  MONGOLGPT_PRODUCTION_CONFIRMATION: ${{ inputs.production_confirmation }}
  MONGOLGPT_AUTH_EMAIL_DOMAINS: ${{ vars.MONGOLGPT_AUTH_EMAIL_DOMAINS }}
  CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_DEFAULT_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    if: github.repository == 'sergei10a-rgb/mongolgpt' && vars.MONGOLGPT_DOMAIN != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: ${{ inputs.stage }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Validate Cloudflare deployment
        run: bun run deploy:preflight -- ${{ inputs.stage }}

      - name: Typecheck
        run: bun typecheck

      - name: Build docs
        run: bun run build:docs

      - name: Build web app
        run: bun --cwd packages/app build

      - name: Deploy to Cloudflare
        run: bun sst deploy --stage=${{ inputs.stage }} --print-logs

      - name: Apply Cloudflare D1 migrations
        if: inputs.hosted_services == true
        run: bun sst shell --stage=${{ inputs.stage }} -- bun run db:migrate

      - name: Verify deployed URLs
        run: bun run deploy:smoke -- ${{ inputs.stage }}
